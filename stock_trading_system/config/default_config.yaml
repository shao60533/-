llm_provider: null   # null -> legacy auto-detect; "qwen" | "gemini" | "openrouter" -> force

gemini:
  api_key: ""
  model: "gemini-3.1-pro-preview"
  deep_think_model: "gemini-3.1-pro-preview"
  thinking_level: "high"

# OpenRouter — aggregator that exposes 100+ models behind a single key.
# Set OPENROUTER_API_KEY env to auto-enable in cloud (highest priority,
# beats both yaml api_key and the qwen / gemini auto-detect).
#
# Model selection is two-tier:
#   * `presets[]` is the pool — you can add / remove / edit entries.
#   * `active.{deep,quick}` are pointers into that pool.
# Switching deep model = swap `active.deep` to a different preset id.
# `provider_order` controls which underlying vendor OR routes to first
# (with fallback to the rest); leave empty to let OR choose.
openrouter:
  enabled: false
  api_key: ""                                       # 或 env OPENROUTER_API_KEY
  base_url: "https://openrouter.ai/api/v1"
  http_referer: ""
  x_title: "StockAI Terminal"
  timeout: 120
  presets:
    - id: "deepseek-v4-pro"
      label: "DeepSeek V4 Pro"
      model: "deepseek/deepseek-v4-pro"
      role: "deep"
      provider_order: ["deepseek", "novita"]
      kwargs: {}
    - id: "gemini-3.1-pro"
      label: "Gemini 3.1 Pro"
      # OR currently lists Gemini 3.1 Pro as a preview tag; rename
      # here when Google flips the GA suffix.
      model: "google/gemini-3.1-pro-preview"
      role: "deep"
      provider_order: ["google-ai-studio", "google-vertex"]
      kwargs: {}
    - id: "deepseek-v4-flash"
      label: "DeepSeek V4 Flash"
      model: "deepseek/deepseek-v4-flash"
      role: "quick"
      provider_order: ["deepseek", "novita", "fireworks"]
      kwargs: {}
  active:
    deep:  "deepseek-v4-pro"
    quick: "deepseek-v4-flash"

# Polygon.io — disabled by default (free tier is rate-limited; not cloud-friendly).
# Enable explicitly via providers.polygon_enabled when you have a paid key.
polygon:
  api_key: ""

akshare: {}

# Qwen (通义千问) — primary data source for cloud deployment.
# Set DASHSCOPE_API_KEY env var to auto-enable in cloud (Railway, etc.).
qwen:
  enabled: false
  api_key: ""
  model: "qwen-plus"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  timeout: 30

# Interactive Brokers — disabled by default (requires local TWS process).
# Useful only when running the system on the same machine as IB Gateway/TWS.
ib:
  host: "127.0.0.1"
  port: 7496
  client_id: 1
  enabled: false

# Charles Schwab Trader API — primary US realtime source when configured.
# Requires OAuth bootstrap via /oauth/schwab/start on Railway. App key/secret
# come from env (SCHWAB_APP_KEY / SCHWAB_APP_SECRET); token persists to Volume.
schwab:
  enabled: false
  app_key: ""              # or env SCHWAB_APP_KEY
  app_secret: ""           # or env SCHWAB_APP_SECRET
  callback_url: ""         # e.g. https://<app>.up.railway.app/oauth/schwab/callback
  token_path: "data/schwab_token.json"
  oauth_secret: ""         # magic-link guard for /oauth/schwab/start; or env SCHWAB_OAUTH_SECRET
  account_hash: ""         # optional; required only for account-level endpoints (P2)

# Provider-level master switches (preferred over per-provider .enabled flags).
# DataRouter consults these first to skip even initialization in cloud envs.
providers:
  ib_enabled: false
  polygon_enabled: true
  yfinance_enabled: true
  akshare_enabled: true
  schwab_enabled: true     # gated by schwab.enabled + token file existence

# DataRouter routing & caching policy (see ARCHITECTURE_UPGRADE_PROPOSAL §4).
data_routing:
  primary: "qwen"          # "qwen" or "local"; first source to try
  realtime_primary: "schwab"  # "schwab" preferred for live US quotes when configured
  enable_cache: true
  cache_ttl:
    price_quote: 60        # 1 min
    daily_bars: 43200      # 12 h
    minute_bars: 300       # 5 min
    fundamentals: 86400    # 24 h
    news: 3600             # 1 h
    screen_results: 3600   # 1 h

# Async task system (see ARCHITECTURE_UPGRADE_PROPOSAL §4.2).
tasks:
  max_workers: 3              # Concurrent worker threads
  idempotency_window: 60      # Reuse identical task within N seconds
  retention_days: 30          # Auto-purge task records older than N days
  cleanup_interval: 21600     # Run cleanup every N seconds (6h)

screener:
  us_market:
    min_market_cap: 1000000000
    min_volume: 500000
    max_pe: 50
    top_n: 10
  cn_market:
    min_market_cap: 5000000000
    min_volume: 1000000
    max_pe: 50
    top_n: 10

alerts:
  check_interval: 60
  telegram:
    bot_token: ""
    chat_id: ""
    enabled: false
    # hardening-iteration-v1 P1.1 [C2] — bot is multi-tenant now.
    # Empty `user_map` = bot runs but every command is denied (locked-down
    # default). Map Telegram chat ids to registered user emails; only listed
    # chats get to /buy /sell /alert and they operate on THEIR own data.
    # `user_map` keys are Telegram chat ids (int as string OR int — both
    # accepted), values are the registered user's email. Resolution happens
    # once at bot startup against the users table.
    user_map: {}
  email:
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    to_address: ""
    enabled: false

reports:
  output_dir: "reports_output"
  schedule: "daily"

# Portfolio storage. On Railway the working directory is ephemeral — point this
# at a Persistent Volume mount (e.g. /data/portfolio.db) for durability.
portfolio:
  db_path: "data/portfolio.db"

# Paper-trade simulator. The Decimal flag below is the hardening-iteration-v1
# P2.6 feature flag (designed §3.3): when enabled, cash / PnL accumulate via
# decimal.Decimal instead of float so 1000 buy/sell loops don't drift due to
# binary-float rounding error. Default OFF — step-1 (this PR) ships the flag
# and the helper module; step-2 (subsequent PR) rewires
# simulator.py / order_engine.py / session_store.py to consult the flag and
# do the actual arithmetic conversion. Flip to true only after a dogfood
# week confirms the new path matches existing reports to the cent.
paper_trade:
  decimal: false

# Backtest engine selection. P3.2 step-3 grayscale flag — set to "v2"
# to opt the /api/backtest/run endpoint into the BacktestEngine code
# path (uses to_v1_dict() to keep the response schema compatible).
# Default "v1" preserves the legacy Backtester output exactly. Flip
# only after the parity test confirms the slippage/年化/RSI defaults
# match what your dashboards expect.
backtest:
  engine: "v1"

# Screener engine selection. P3.1 step-3 grayscale flag — set to "v3"
# to opt the /api/screen endpoint (and the Telegram /screen command,
# and the ``stock screen`` CLI) into the V3 guru pipeline via the
# screen_sync wrapper. Default "v1" preserves the legacy 3-layer
# (IB Scanner + finviz + AI) results. Flip only after dogfood
# confirms the guru voting output is acceptable for your strategies.
screener:
  engine: "v1"

# Self-iterating agent evolution module (see docs/design/self-iterating-agents.md).
iteration:
  enabled: false                  # Master switch — disabled by default
  model: "qwen3.6-plus"          # LLM for Meta Agent + signal extraction
  fallback_model: "qwen-plus"

  scorer:
    extract_signals: true         # Extract per-agent directional signals
    backfill_5d: true
    backfill_20d: true
    rolling_window_days: 30
    min_samples: 5                # Skip Sharpe when fewer than 5 observations

  darwinian:
    enabled: true
    boost: 1.05                   # atlas-elenchus default: top 25% daily +5%
    decay: 0.95                   # atlas-elenchus default: bottom 25% daily -5%
    floor: 0.3
    ceiling: 2.5

  meta:
    enabled: false                # Phase 3 — disabled until prompt injection ready
    ab_test_days: 5
    max_rewrites_per_week: 1
