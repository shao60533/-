<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — StockAI</title>
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        /* mobile-ui v1.3.x (2026-05-15): the original `body { display:flex;
           align-items:center; justify-content:center; min-height:100vh; }`
           rule produced a fully-centered card with ~250px of pure-black
           space above and below it on iPhone 390×844 viewports. The fix:
           top-align on mobile, only center on tablets/desktop. ``100dvh``
           replaces ``100vh`` so the height stays stable while the mobile
           browser address bar collapses. */
        html, body { margin: 0; }
        body {
          display: flex;
          flex-direction: column;
          /* Mobile: top-aligned card with a small comfortable gap. */
          justify-content: flex-start;
          align-items: center;
          min-height: 100dvh;
          padding-top: max(32px, env(safe-area-inset-top));
          padding-bottom: max(24px, env(safe-area-inset-bottom));
          padding-left: 16px;
          padding-right: 16px;
          background: var(--bg-primary);
          box-sizing: border-box;
        }
        /* Tablet+ — return to fully centred for the desktop login surface
           where the viewport is tall enough that centring still reads as
           intentional. */
        @media (min-width: 640px) {
          body {
            justify-content: center;
            padding-top: max(40px, env(safe-area-inset-top));
            padding-bottom: max(40px, env(safe-area-inset-bottom));
          }
        }
        /* Mobile card sizing: tighter padding + smaller radius so the
           hero block doesn't push the OAuth strip off-screen at 390px. */
        .auth-card {
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 24px 20px;
          width: 100%;
          max-width: 420px;
          box-sizing: border-box;
        }
        @media (min-width: 640px) {
          .auth-card { border-radius: 12px; padding: 40px 32px; max-width: 400px; }
        }
        .auth-title { font-size:22px; font-weight:700; text-align:center; margin-bottom:20px; color:var(--accent-blue); }
        @media (min-width: 640px) {
          .auth-title { font-size: 24px; margin-bottom: 24px; }
        }
        .auth-input { width:100%; padding:12px 16px; margin-bottom:12px; background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border); border-radius:8px; font-size:16px; box-sizing:border-box; }
        @media (min-width: 640px) {
          .auth-input { font-size: 14px; margin-bottom: 16px; }
        }
        .auth-input:focus { outline:none; border-color:var(--accent-blue); }
        .auth-btn { width:100%; padding:14px; background:var(--accent-blue); color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; }
        .auth-btn:hover { opacity:0.9; }
        .auth-link { text-align:center; margin-top:14px; font-size:13px; color:var(--text-secondary); }
        .auth-link a { color:var(--accent-blue); text-decoration:none; }
        .auth-error { color:var(--accent-red); font-size:13px; text-align:center; margin-bottom:12px; display:none; }
        .auth-notice { color:var(--text-secondary); font-size:12px; text-align:center; margin-bottom:12px; padding:8px; background:var(--bg-secondary); border-radius:6px; display:none; }
        /* v1.0 addendum (R-OAUTH-11a/11b): OAuth buttons sit BELOW
           the email/password form as the secondary login path. White
           bg + #d0d7de border + 6px radius matches the GitHub Sign In
           visual standard so multi-color Google G + monochrome GitHub
           octocat both read clean. */
        .oauth-list { display:flex; flex-direction:column; gap:8px; }
        .oauth-btn {
          display:flex; align-items:center; justify-content:center;
          gap:10px; padding:11px 14px;
          background:#fff; color:#24292f;
          border:1px solid #d0d7de; border-radius:6px;
          text-decoration:none; font-size:14px; font-weight:500;
          min-height:44px;
          transition:background 0.15s, border-color 0.15s;
        }
        .oauth-btn:hover { background:#f6f8fa; border-color:#afb8c1; }
        .oauth-btn img { display:block; }
        /* Mobile-tighter divider: 16/12 rhythm keeps the OAuth strip
           visible above the fold at 390×844; the desktop md+ rule
           preserves the original 24/16 spacing. */
        .oauth-divider { display:none; text-align:center; margin:16px 0 12px; color:#888; font-size:12px; }
        @media (min-width: 640px) {
          .oauth-divider { margin: 24px 0 16px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-title"><i class="fas fa-bolt"></i> StockAI 登录</div>
        <div class="auth-notice" id="login-notice"></div>
        <div class="auth-error" id="login-error"></div>
        <input type="email" class="auth-input" id="login-email" placeholder="邮箱" autocomplete="email">
        <input type="password" class="auth-input" id="login-password" placeholder="密码" autocomplete="current-password">
        <button class="auth-btn" onclick="doLogin()">登录</button>
        <div class="auth-link">没有账号？<a href="/register">注册</a></div>
        <!-- v1.0 addendum: OAuth quick-signin sits BELOW the email/password
             form as the secondary login path. Email/password is the high-
             frequency primary surface for already-registered users; OAuth
             is the alternate. Divider + buttons stay hidden when no OAuth
             provider is configured (env keys absent). -->
        <div class="oauth-divider" id="oauth-divider">或使用</div>
        <div class="oauth-list" id="oauth-list"></div>
    </div>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
    // ── Surface OAuth callback errors / notices via querystring ─────────
    (function showOAuthMessages() {
        const params = new URLSearchParams(location.search);
        const err = params.get('error');
        const notice = params.get('notice');
        const errEl = document.getElementById('login-error');
        const noticeEl = document.getElementById('login-notice');
        const ERROR_MESSAGES = {
            state_mismatch: 'OAuth state 校验失败，请重试',
            missing_verifier: 'PKCE verifier 丢失，请重新登录',
            no_code: '授权未完成',
            unknown_provider: '未知的 OAuth 提供方',
            exchange_failed: '与 OAuth 提供方通信失败',
            link_requires_login: '请先登录后再绑定 OAuth',
        };
        if (err) {
            errEl.textContent = ERROR_MESSAGES[err] || ('登录失败: ' + err);
            errEl.style.display = 'block';
        }
        if (notice === 'email_unverified_link') {
            const provider = params.get('provider') || '';
            const email = params.get('email') || '';
            noticeEl.textContent = `${provider} 账户的邮箱 ${email} 未验证，请先用邮箱密码登录后到设置中绑定`;
            noticeEl.style.display = 'block';
        }
    })();

    // ── Render configured OAuth provider buttons ────────────────────────
    (async function renderOAuthButtons() {
        try {
            const res = await fetch('/api/auth/providers', { credentials: 'same-origin' });
            if (!res.ok) return;
            const { providers } = await res.json();
            if (!providers || providers.length === 0) return;
            const list = document.getElementById('oauth-list');
            const divider = document.getElementById('oauth-divider');
            const params = new URLSearchParams(location.search);
            const next = params.get('next') || '/';
            list.innerHTML = providers.map(function(p) {
                const startUrl = '/auth/oauth/' + encodeURIComponent(p.name) +
                                 '/start?next=' + encodeURIComponent(next);
                return '<a class="oauth-btn" href="' + startUrl + '">' +
                       '<img src="' + p.icon + '" width="18" height="18" alt="" />' +
                       '<span>' + p.label + '</span></a>';
            }).join('');
            // v1.0 addendum: divider uses block layout (centered text) since
            // the buttons live below the form now — no flexbox horizontal
            // rule needed.
            divider.style.display = 'block';
        } catch (_) { /* network failure: silently fall back to email/password */ }
    })();

    async function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        errEl.style.display = 'none';
        try {
            const resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password}),
            });
            const data = await resp.json();
            if (!resp.ok) {
                errEl.textContent = data.message || '登录失败';
                errEl.style.display = 'block';
                return;
            }
            const params = new URLSearchParams(location.search);
            location.href = params.get('next') || '/';
        } catch (e) {
            errEl.textContent = '网络错误';
            errEl.style.display = 'block';
        }
    }
    document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>
</html>
